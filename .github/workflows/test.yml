name: Test Suite

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'PROJECT_DNA.json'
      - 'PROJECT_DNA.yaml'
      - 'PROJECT_STATE.json'
      - 'STATUS.md'
      - 'BACKLOG.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'PROJECT_DNA.json'
      - 'PROJECT_DNA.yaml'
      - 'PROJECT_STATE.json'
      - 'STATUS.md'
      - 'BACKLOG.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run type check
        run: npm run typecheck
      - name: Run tests
        run: npm test
      - name: Generate coverage report
        if: matrix.node-version == '22.x'
        run: npm run test:coverage
